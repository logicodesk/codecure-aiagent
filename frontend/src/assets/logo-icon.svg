<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0ea5e9"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M32 4 L54 13 L54 34 C54 46 44 56 32 60 C20 56 10 46 10 34 L10 13 Z"
        fill="url(#shield-grad)" opacity="0.15"/>
  <path d="M32 4 L54 13 L54 34 C54 46 44 56 32 60 C20 56 10 46 10 34 L10 13 Z"
        fill="none" stroke="url(#shield-grad)" stroke-width="1.5"/>

  <!-- Molecule: centre atom -->
  <circle cx="32" cy="32" r="4" fill="url(#shield-grad)" filter="url(#glow)"/>

  <!-- Molecule: outer atoms -->
  <circle cx="20" cy="24" r="2.5" fill="#06b6d4" opacity="0.9"/>
  <circle cx="44" cy="24" r="2.5" fill="#0ea5e9" opacity="0.9"/>
  <circle cx="20" cy="40" r="2.5" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="44" cy="40" r="2.5" fill="#06b6d4" opacity="0.9"/>
  <circle cx="32" cy="20" r="2"   fill="#0ea5e9" opacity="0.7"/>
  <circle cx="32" cy="44" r="2"   fill="#8b5cf6" opacity="0.7"/>

  <!-- Bonds -->
  <line x1="32" y1="32" x2="20" y2="24" stroke="#06b6d4" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="32" x2="44" y2="24" stroke="#0ea5e9" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="32" x2="20" y2="40" stroke="#8b5cf6" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="32" x2="44" y2="40" stroke="#06b6d4" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="32" x2="32" y2="20" stroke="#0ea5e9" stroke-width="1"   opacity="0.5"/>
  <line x1="32" y1="32" x2="32" y2="44" stroke="#8b5cf6" stroke-width="1"   opacity="0.5"/>

  <!-- Neural arc hints -->
  <path d="M20 24 Q32 14 44 24" fill="none" stroke="#0ea5e9" stroke-width="0.8" opacity="0.35" stroke-dasharray="2 2"/>
  <path d="M20 40 Q32 50 44 40" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.35" stroke-dasharray="2 2"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" fill="none">
  <defs>
    <linearGradient id="shield-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0ea5e9"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="text-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0ea5e9"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield -->
  <path d="M40 6 L62 14 L62 36 C62 48 52 58 40 62 C28 58 18 48 18 36 L18 14 Z"
        fill="url(#shield-g)" opacity="0.15"/>
  <path d="M40 6 L62 14 L62 36 C62 48 52 58 40 62 C28 58 18 48 18 36 L18 14 Z"
        fill="none" stroke="url(#shield-g)" stroke-width="1.5"/>

  <!-- Centre atom -->
  <circle cx="40" cy="34" r="4" fill="url(#shield-g)" filter="url(#glow)"/>
  <!-- Outer atoms -->
  <circle cx="29" cy="26" r="2.5" fill="#06b6d4" opacity="0.9"/>
  <circle cx="51" cy="26" r="2.5" fill="#0ea5e9" opacity="0.9"/>
  <circle cx="29" cy="42" r="2.5" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="51" cy="42" r="2.5" fill="#06b6d4" opacity="0.9"/>
  <circle cx="40" cy="22" r="2"   fill="#0ea5e9" opacity="0.7"/>
  <circle cx="40" cy="46" r="2"   fill="#8b5cf6" opacity="0.7"/>
  <!-- Bonds -->
  <line x1="40" y1="34" x2="29" y2="26" stroke="#06b6d4" stroke-width="1.2" opacity="0.7"/>
  <line x1="40" y1="34" x2="51" y2="26" stroke="#0ea5e9" stroke-width="1.2" opacity="0.7"/>
  <line x1="40" y1="34" x2="29" y2="42" stroke="#8b5cf6" stroke-width="1.2" opacity="0.7"/>
  <line x1="40" y1="34" x2="51" y2="42" stroke="#06b6d4" stroke-width="1.2" opacity="0.7"/>
  <line x1="40" y1="34" x2="40" y2="22" stroke="#0ea5e9" stroke-width="1"   opacity="0.5"/>
  <line x1="40" y1="34" x2="40" y2="46" stroke="#8b5cf6" stroke-width="1"   opacity="0.5"/>

  <!-- Wordmark: "Toxi" plain + "Guard AI" gradient -->
  <text x="80" y="50" font-family="Inter, system-ui, sans-serif" font-weight="800"
        font-size="32" fill="#0f172a" letter-spacing="-0.5">Toxi</text>
  <text x="148" y="50" font-family="Inter, system-ui, sans-serif" font-weight="800"
        font-size="32" fill="url(#text-g)" letter-spacing="-0.5">Guard AI</text>

  <!-- Tagline -->
  <text x="80" y="66" font-family="Inter, system-ui, sans-serif" font-weight="400"
        font-size="11" fill="#64748b" letter-spacing="0.2">
    AI-powered molecular toxicity intelligence
  </text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 32" fill="none">
  <defs>
    <linearGradient id="sh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0ea5e9"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="tx" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="g2">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mini shield -->
  <path d="M16 2 L27 6 L27 17 C27 23 22 28 16 30 C10 28 5 23 5 17 L5 6 Z"
        fill="url(#sh)" opacity="0.15"/>
  <path d="M16 2 L27 6 L27 17 C27 23 22 28 16 30 C10 28 5 23 5 17 L5 6 Z"
        fill="none" stroke="url(#sh)" stroke-width="1.2"/>

  <!-- Centre atom -->
  <circle cx="16" cy="16" r="2.2" fill="url(#sh)" filter="url(#g2)"/>
  <!-- Outer atoms -->
  <circle cx="10" cy="12" r="1.4" fill="#06b6d4" opacity="0.9"/>
  <circle cx="22" cy="12" r="1.4" fill="#0ea5e9" opacity="0.9"/>
  <circle cx="10" cy="20" r="1.4" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="22" cy="20" r="1.4" fill="#06b6d4" opacity="0.9"/>
  <!-- Bonds -->
  <line x1="16" y1="16" x2="10" y2="12" stroke="#06b6d4" stroke-width="0.8" opacity="0.7"/>
  <line x1="16" y1="16" x2="22" y2="12" stroke="#0ea5e9" stroke-width="0.8" opacity="0.7"/>
  <line x1="16" y1="16" x2="10" y2="20" stroke="#8b5cf6" stroke-width="0.8" opacity="0.7"/>
  <line x1="16" y1="16" x2="22" y2="20" stroke="#06b6d4" stroke-width="0.8" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="34" y="22" font-family="Inter, system-ui, sans-serif" font-weight="800"
        font-size="15" fill="#0f172a" letter-spacing="-0.3">Toxi</text>
  <text x="68" y="22" font-family="Inter, system-ui, sans-serif" font-weight="800"
        font-size="15" fill="url(#tx)" letter-spacing="-0.3">Guard AI</text>
</svg>
